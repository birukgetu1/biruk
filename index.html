<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location - Biruk Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .bot-link {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .bot-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s;
            font-weight: 600;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .coords-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: monospace;
            display: none;
            text-align: left;
        }
        
        .privacy {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .map-link {
            color: #667eea;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        
        .github-link {
            margin-top: 20px;
            font-size: 12px;
        }
        
        .github-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Share Location</h1>
        <p class="subtitle">Send your location to @Biruklocationbot</p>
        
        <div class="bot-link">
            🤖 <a href="https://t.me/Biruklocationbot" target="_blank">@Biruklocationbot</a>
        </div>
        
        <button id="shareBtn" onclick="shareLocation()">
            📍 Share My Current Location
        </button>
        
        <div id="status" class="status"></div>
        <div id="coords" class="coords-box"></div>
        
        <div class="privacy">
            🔒 Your location is sent directly to Telegram. You'll receive a notification on @Biruklocationbot
        </div>
        
        <div class="github-link">
            🚀 Running on GitHub Pages | No server required
        </div>
    </div>

    <script>
        // Your bot credentials
        const BOT_TOKEN = "8689283758:AAGAoRKk6uoS1NrC828IWkpizNYM__9K7Qg";
        const CHAT_ID = "1755569425";
        
        const statusDiv = document.getElementById('status');
        const coordsDiv = document.getElementById('coords');
        const shareBtn = document.getElementById('shareBtn');
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                if (statusDiv.style.display === 'block') {
                    statusDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        async function shareLocation() {
            if (!navigator.geolocation) {
                showStatus('❌ Geolocation not supported by your browser', 'error');
                return;
            }
            
            shareBtn.disabled = true;
            shareBtn.innerHTML = '<span class="loader"></span> Getting your location...';
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    // Show coordinates to user
                    coordsDiv.innerHTML = `
                        <strong>📍 Your Location:</strong><br>
                        Latitude: ${lat.toFixed(6)}<br>
                        Longitude: ${lng.toFixed(6)}<br>
                        Accuracy: ±${Math.round(accuracy)} meters<br>
                        <a href="https://maps.google.com/?q=${lat},${lng}" target="_blank" class="map-link">
                            🗺️ View on Google Maps →
                        </a>
                    `;
                    coordsDiv.style.display = 'block';
                    
                    showStatus('📤 Sending location to Telegram...', 'info');
                    
                    // Send to Telegram directly from JavaScript
                    await sendToTelegram(lat, lng);
                    
                    shareBtn.disabled = false;
                    shareBtn.innerHTML = '📍 Share My Current Location';
                },
                (error) => {
                    let errorMsg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = '❌ Location access denied. Please enable location access in your browser settings.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = '❌ Location unavailable. Please check your GPS.';
                            break;
                        case error.TIMEOUT:
                            errorMsg = '⏱️ Timeout. Please try again.';
                            break;
                        default:
                            errorMsg = '❌ Error getting location.';
                    }
                    showStatus(errorMsg, 'error');
                    shareBtn.disabled = false;
                    shareBtn.innerHTML = '📍 Share My Current Location';
                }
            );
        }
        
        async function sendToTelegram(lat, lng) {
            try {
                // Create the message
                const time = new Date().toLocaleString();
                const mapsLink = `https://maps.google.com/?q=${lat},${lng}`;
                
                const message = `📍 *NEW LOCATION SHARED!* 📍\n\n` +
                    `*Coordinates:*\n` +
                    `└ Latitude: \`${lat.toFixed(6)}\`\n` +
                    `└ Longitude: \`${lng.toFixed(6)}\`\n\n` +
                    `*Time:* \`${time}\`\n\n` +
                    `*Link:* [🗺️ Open in Google Maps](${mapsLink})`;
                
                // Send to Telegram API
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown',
                        disable_web_page_preview: true
                    })
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    showStatus('✅ Location sent successfully! Check your Telegram bot!', 'success');
                } else {
                    showStatus('⚠️ Failed to send: ' + data.description, 'error');
                }
            } catch (error) {
                showStatus('❌ Connection error: ' + error.message, 'error');
                console.error('Error:', error);
            }
        }
        
        // Optional: Add keyboard shortcut (Ctrl+Enter to share)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                shareLocation();
            }
        });
    </script>
</body>
</html>
